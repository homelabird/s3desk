services:
  postgres:
    image: docker.io/library/postgres:15-alpine
    environment:
      POSTGRES_DB: s3desk
      POSTGRES_USER: s3desk
      POSTGRES_PASSWORD: s3desk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    volumes:
      - s3desk-postgres:/var/lib/postgresql/data

  s3desk:
    # Local-only development compose. Do not reuse as a remote deployment template.
    build:
      context: ../..
      dockerfile: Containerfile.local
      args:
        DB_BACKEND: postgres
        RCLONE_VERSION: ${RCLONE_VERSION:-1.72.0}
    image: s3desk-local:dev
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${S3DESK_PORT:-8080}:8080"
    environment:
      ADDR: "0.0.0.0:8080"
      ALLOW_REMOTE: "false"
      API_TOKEN: "${API_TOKEN:?set API_TOKEN before running docker-compose.local-build.yml}"
      DB_BACKEND: "postgres"
      DATABASE_URL: "postgres://s3desk:s3desk@postgres:5432/s3desk?sslmode=disable"
      JOB_QUEUE_CAPACITY: "20"
      RCLONE_RETRY_ATTEMPTS: "3"
      RCLONE_RETRY_BASE_DELAY: "800ms"
      RCLONE_RETRY_MAX_DELAY: "8s"
      RCLONE_RETRY_JITTER_RATIO: "0.2"
    volumes:
      - s3desk-data:/data
      - "${OCI_CONFIG_MOUNT_DIR:?set OCI_CONFIG_MOUNT_DIR or run via scripts/compose.sh dev}:/data/oci:ro,z"

volumes:
  s3desk-data:
  s3desk-postgres:
