# Remote deployment template with Caddy TLS termination in front of S3Desk.
# Requires a public DNS hostname that resolves to this server.
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-s3desk}
      POSTGRES_USER: ${POSTGRES_USER:-s3desk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD for remote deployment}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    volumes:
      - s3desk-postgres:/var/lib/postgresql/data

  s3desk:
    image: "${S3DESK_IMAGE:?set S3DESK_IMAGE}:${S3DESK_TAG:?set S3DESK_TAG}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      ADDR: "0.0.0.0:8080"
      ALLOW_REMOTE: "true"
      API_TOKEN: "${API_TOKEN:?set API_TOKEN for remote deployment}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:?set ALLOWED_HOSTS to the public hostname served by Caddy}"
      EXTERNAL_BASE_URL: "${EXTERNAL_BASE_URL:?set EXTERNAL_BASE_URL to https://<public-hostname>}"
      DB_BACKEND: "postgres"
      DATABASE_URL: "postgres://${POSTGRES_USER:-s3desk}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD for remote deployment}@postgres:5432/${POSTGRES_DB:-s3desk}?sslmode=disable"
      JOB_QUEUE_CAPACITY: "20"
      RCLONE_RETRY_ATTEMPTS: "3"
      RCLONE_RETRY_BASE_DELAY: "800ms"
      RCLONE_RETRY_MAX_DELAY: "8s"
      RCLONE_RETRY_JITTER_RATIO: "0.2"
    volumes:
      - s3desk-data:/data

  caddy:
    image: caddy:2.8.4
    restart: unless-stopped
    depends_on:
      - s3desk
    ports:
      - "80:80"
      - "443:443"
    environment:
      S3DESK_DOMAIN: "${S3DESK_DOMAIN:?set S3DESK_DOMAIN to the public hostname served by Caddy}"
    volumes:
      - ../../deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  s3desk-data:
  s3desk-postgres:
  caddy-data:
  caddy-config:
