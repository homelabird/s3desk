name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: backend/go.sum

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Run full repository check gate
        shell: bash
        run: ./scripts/check.sh
