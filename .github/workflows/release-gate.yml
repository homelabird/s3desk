name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: backend/go.sum

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install backend security helper tools
        shell: bash
        run: |
          set -euo pipefail
          go install honnef.co/go/tools/cmd/staticcheck@v0.6.1
          go install github.com/securego/gosec/v2/cmd/gosec@v2.23.0
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Install frontend dependencies for Playwright browser setup
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium for release-gate browser smoke
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run full repository check gate
        shell: bash
        run: ./scripts/check.sh
