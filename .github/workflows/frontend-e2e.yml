name: Frontend E2E

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: frontend-e2e-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      browser_facing: ${{ steps.filter.outputs.browser_facing }}
      frontend_bundle: ${{ steps.filter.outputs.frontend_bundle }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend and browser-facing change scope
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            browser_facing:
              - ".github/workflows/frontend-e2e.yml"
              - "compose/test/e2e.yml"
              - "compose/remote/**"
              - "deploy/caddy/**"
              - "charts/s3desk/**"
              - "scripts/compose.sh"
              - "scripts/run_live_e2e_local.sh"
              - "scripts/bundle_report.js"
              - "openapi.yml"
              - "frontend/**"
              - "backend/cmd/server/**"
              - "backend/internal/app/**"
              - "backend/internal/api/**"
            frontend_bundle:
              - ".github/workflows/frontend-e2e.yml"
              - "scripts/bundle_report.js"
              - "openapi.yml"
              - "frontend/**"

  bundle-budget:
    if: github.event_name != 'schedule' && needs.changes.outputs.frontend_bundle == 'true'
    needs:
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Run bundle budget check
        shell: bash
        run: |
          set -euo pipefail
          npm run build:analyze 2>&1 | tee dist/build-analyze.log
          if grep -q 'Circular chunk:' dist/build-analyze.log; then
            echo "circular chunk warning detected in bundle build" >&2
            exit 1
          fi
          node ../scripts/bundle_report.js --fail

      - name: Upload bundle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-bundle-report
          path: |
            frontend/dist/build-analyze.log
            frontend/dist/bundle-report.md
            frontend/dist/stats.json
            frontend/dist/stats.html
          if-no-files-found: ignore

  mock-e2e:
    name: Core Mock E2E
    if: github.event_name != 'schedule'
    needs:
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Skip core mock suite when no browser-facing changes were detected
        if: needs.changes.outputs.browser_facing != 'true'
        run: |
          echo "No browser-facing changes detected."
          echo "Required check passes without running the mock Playwright suite."

      - name: Install frontend dependencies
        if: needs.changes.outputs.browser_facing == 'true'
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium for desktop and mobile projects
        if: needs.changes.outputs.browser_facing == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run mock Playwright suite excluding dedicated mobile responsive specs
        if: needs.changes.outputs.browser_facing == 'true'
        run: npm run test:e2e:core

      - name: Upload core mock Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-core-mock-results
          path: frontend/test-results
          if-no-files-found: ignore

  mobile-responsive-e2e:
    name: Mobile Responsive E2E (Required)
    if: github.event_name != 'schedule'
    needs:
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_HTML_REPORT: "1"
      PLAYWRIGHT_HTML_REPORT_DIR: playwright-report-mobile-responsive
      PLAYWRIGHT_OUTPUT_DIR: test-results-mobile-responsive
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Skip mobile responsive suite when no browser-facing changes were detected
        if: needs.changes.outputs.browser_facing != 'true'
        run: |
          echo "No browser-facing changes detected."
          echo "Required check passes without running the dedicated mobile responsive suite."

      - name: Install frontend dependencies
        if: needs.changes.outputs.browser_facing == 'true'
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium for mobile responsive projects
        if: needs.changes.outputs.browser_facing == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run dedicated mobile responsive Playwright suite
        if: needs.changes.outputs.browser_facing == 'true'
        run: npm run test:e2e:mobile-responsive

      - name: Upload mobile responsive HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-responsive-e2e-html-report
          path: frontend/playwright-report-mobile-responsive
          if-no-files-found: ignore

      - name: Upload mobile responsive Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-responsive-e2e-test-results
          path: frontend/test-results-mobile-responsive
          if-no-files-found: ignore

      - name: Write mobile responsive summary
        if: always()
        run: |
          {
            echo "## Mobile Responsive E2E"
            echo ""
            echo "- Required check: \`Mobile Responsive E2E (Required)\`"
            echo "- Local/CI command: \`npm run test:e2e:mobile-responsive\`"
            echo "- HTML report artifact: \`mobile-responsive-e2e-html-report\`"
            echo "- HTML report directory: \`frontend/playwright-report-mobile-responsive/\`"
            echo "- Report entry file: \`frontend/playwright-report-mobile-responsive/index.html\`"
            echo "- Raw test results artifact: \`mobile-responsive-e2e-test-results\`"
            echo "- Raw test results directory: \`frontend/test-results-mobile-responsive/\`"
            echo "- Targeted Settings/Login command: \`npm run test:e2e:mobile-responsive:settings-login\`"
          } >> "$GITHUB_STEP_SUMMARY"

  live-e2e-critical:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CRITICAL_LIVE_TESTS: tests/api-crud.spec.ts tests/objects-live-flow.spec.ts tests/jobs-live-flow.spec.ts tests/transfers-live-fallback.spec.ts tests/bucket-policy-live.spec.ts tests/docs-smoke.spec.ts tests/server-migration-live.spec.ts tests/uploads-folder-live.spec.ts tests/objects-image-preview-live.spec.ts
      E2E_API_TOKEN: change-me
      E2E_S3_ENDPOINT: http://127.0.0.1:9000
      E2E_S3_REGION: us-east-1
      E2E_S3_ACCESS_KEY: minioadmin
      E2E_S3_SECRET_KEY: minioadmin
      E2E_S3_FORCE_PATH_STYLE: "true"
      E2E_S3_TLS_SKIP_VERIFY: "true"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
      DOCS_BASE_URL: http://127.0.0.1:8080
      S3DESK_IMAGE: s3desk-e2e:ci
      MINIO_IMAGE: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
      AZURITE_IMAGE: mcr.microsoft.com/azure-storage/azurite:3.33.0
      FAKE_GCS_IMAGE: fsouza/fake-gcs-server:1.47.7
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build local S3Desk image
        run: docker build -t "${S3DESK_IMAGE}" -f Containerfile.local .

      - name: Start live E2E stack
        run: ./scripts/compose.sh e2e up -d minio azurite fake-gcs-server s3desk

      - name: Wait for backend health
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS "${PLAYWRIGHT_BASE_URL}/healthz" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "backend health check failed" >&2
          exit 1

      - name: Run nightly live Playwright suite
        working-directory: frontend
        env:
          E2E_LIVE: "1"
        run: npx playwright test ${CRITICAL_LIVE_TESTS} --project=chromium

      - name: Capture live E2E stack logs
        if: always()
        run: |
          mkdir -p artifacts
          ./scripts/compose.sh e2e logs --no-color > artifacts/live-e2e-compose.log

      - name: Upload live Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-results
          path: |
            artifacts/live-e2e-compose.log
            frontend/test-results
          if-no-files-found: ignore

      - name: Stop live E2E stack
        if: always()
        run: ./scripts/compose.sh e2e down -v
