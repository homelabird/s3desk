replicaCount: 1

image:
  repository: s3desk
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}
podSecurityContext: {}
securityContext: {}
resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
extraEnvFrom: []

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: s3desk.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

istio:
  virtualService:
    enabled: false
    gateways: []
    hosts: []

networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
  ingress:
    allowSameNamespace: true
    extra: []
  egress:
    allowDns: true
    extra: []

monitoring:
  serviceMonitor:
    enabled: false
    labels: {}
    annotations: {}
    interval: "30s"
    scrapeTimeout: ""
    path: /metrics
    scheme: http
    honorLabels: false
    bearerTokenSecret:
      name: ""
      key: ""
  podMonitor:
    enabled: false
    labels: {}
    annotations: {}
    interval: "30s"
    scrapeTimeout: ""
    path: /metrics
    scheme: http
    honorLabels: false
    bearerTokenSecret:
      name: ""
      key: ""

persistence:
  enabled: true
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  annotations: {}

dataDir: "/data"

server:
  addr: "0.0.0.0:8080"
  externalBaseURL: ""
  allowRemote: true
  # IMPORTANT: For remote access (`server.allowRemote=true`), an API token is required.
  # Set this to a strong random value or use `secrets.existingSecret`.
  apiToken: ""
  encryptionKey: ""
  logFormat: "text"
  logLevel: "info"
  staticDir: ""
  allowedHosts: []
  allowedLocalDirs: []

db:
  backend: "sqlite"
  databaseUrl: ""
  startupTimeout: "30s"
  startupRetryInterval: "1s"
  maxOpenConns: 0
  maxIdleConns: 0
  connMaxLifetime: ""
  connMaxIdleTime: ""

jobs:
  concurrency: 2
  queueCapacity: 256
  logMaxBytes: 0
  logMaxLineBytes: 262144
  logEmitStdout: false
  retention: ""
  logRetention: ""

uploads:
  ttl: "24h"
  maxBytes: 0
  maxConcurrentRequests: 16
  directStream: false

backup:
  restoreMaxBytes: "4294967296"

rclone:
  path: ""
  tune: true
  maxTransfers: null
  maxCheckers: null
  s3ChunkSizeMiB: null
  s3UploadConcurrency: null
  downloadMultiThreadStreams: 16
  downloadMultiThreadCutoffMiB: 4
  downloadBufferSizeMiB: 128
  lowLevelRetries: 10
  captureUnknownErrors: false
  statsInterval: ""
  retryAttempts: 3
  retryBaseDelay: "800ms"
  retryMaxDelay: "8s"
  retryJitterRatio: 0.2

secrets:
  existingSecret: ""
  autoGenerateApiToken: true
  apiTokenKey: "apiToken"
  encryptionKeyKey: "encryptionKey"
  databaseUrlKey: "databaseUrl"

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 2
  periodSeconds: 5

startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 5
  failureThreshold: 30
