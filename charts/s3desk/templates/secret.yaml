{{- $apiToken := trim .Values.server.apiToken -}}
{{- if and (eq $apiToken "") (eq (trim .Values.secrets.existingSecret) "") (.Values.secrets.autoGenerateApiToken | default false) (eq (include "s3desk.metricsTokenRequired" .) "true") -}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace (include "s3desk.secretName" .) -}}
  {{- if and $existing $existing.data (hasKey $existing.data .Values.secrets.apiTokenKey) -}}
    {{- $apiToken = (index $existing.data .Values.secrets.apiTokenKey | b64dec) -}}
  {{- else -}}
    {{- $apiToken = randAlphaNum 40 -}}
  {{- end -}}
{{- end -}}
{{- $hasValues := or (ne $apiToken "") (ne (trim .Values.server.encryptionKey) "") (ne (trim .Values.db.databaseUrl) "") -}}
{{- if and (not .Values.secrets.existingSecret) $hasValues -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "s3desk.secretName" . }}
  labels:
    {{- include "s3desk.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if ne $apiToken "" }}
  {{ .Values.secrets.apiTokenKey }}: {{ $apiToken | quote }}
  {{- end }}
  {{- if ne (trim .Values.server.encryptionKey) "" }}
  {{ .Values.secrets.encryptionKeyKey }}: {{ .Values.server.encryptionKey | quote }}
  {{- end }}
  {{- if ne (trim .Values.db.databaseUrl) "" }}
  {{ .Values.secrets.databaseUrlKey }}: {{ .Values.db.databaseUrl | quote }}
  {{- end }}
{{- end }}
