services:
  minio:
    # Keep registry prefixes explicit so Podman does not rely on unqualified search registries.
    image: "${MINIO_IMAGE:-docker.io/minio/minio:latest}"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-demo-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-demo-minio-secret}
    ports:
      - "${MINIO_BIND_HOST:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-demo-data:/data

  minio-seed:
    image: "${MINIO_MC_IMAGE:-docker.io/minio/mc:latest}"
    depends_on:
      - minio
    network_mode: host
    entrypoint: ["/bin/sh", "/seed-minio.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-demo-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-demo-minio-secret}
      DEMO_BUCKET: ${DEMO_BUCKET:-demo-bucket}
      MINIO_ENDPOINT: http://127.0.0.1:${MINIO_API_PORT:-9000}
    volumes:
      - ./scripts/demo/seed-minio.sh:/seed-minio.sh:ro,z
    restart: "no"

  s3desk:
    build:
      context: .
      dockerfile: Containerfile.local
      args:
        DB_BACKEND: sqlite
        RCLONE_VERSION: ${RCLONE_VERSION:-1.72.0}
    # Podman tags locally built images under localhost by default.
    image: "${S3DESK_DEMO_IMAGE:-localhost/s3desk-demo:sqlite}"
    depends_on:
      - minio
    ports:
      - "127.0.0.1:${S3DESK_PORT:-8080}:8080"
    environment:
      ADDR: "0.0.0.0:8080"
      ALLOW_REMOTE: "true"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      API_TOKEN: ${API_TOKEN:-demo-token}
      EXTERNAL_BASE_URL: ${EXTERNAL_BASE_URL:-http://127.0.0.1:8080}
      DB_BACKEND: "sqlite"
      DATA_DIR: "/data"
      JOB_QUEUE_CAPACITY: "20"
      RCLONE_RETRY_ATTEMPTS: "3"
      RCLONE_RETRY_BASE_DELAY: "800ms"
      RCLONE_RETRY_MAX_DELAY: "8s"
      RCLONE_RETRY_JITTER_RATIO: "0.2"
    volumes:
      - s3desk-demo-data:/data

  s3desk-seed:
    image: "${PYTHON_IMAGE:-docker.io/library/python:3.12-alpine}"
    depends_on:
      - s3desk
    network_mode: host
    entrypoint: ["python3", "/seed-s3desk.py"]
    environment:
      API_TOKEN: ${API_TOKEN:-demo-token}
      S3DESK_API_BASE: http://127.0.0.1:${S3DESK_PORT:-8080}/api/v1
      DEMO_PROFILE_NAME: ${DEMO_PROFILE_NAME:-MinIO Demo}
      DEMO_BUCKET: ${DEMO_BUCKET:-demo-bucket}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-demo-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-demo-minio-secret}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_INTERNAL_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: http://127.0.0.1:${MINIO_API_PORT:-9000}
    volumes:
      - ./scripts/demo/seed-s3desk.py:/seed-s3desk.py:ro,z
    restart: "no"

volumes:
  minio-demo-data:
  s3desk-demo-data:
